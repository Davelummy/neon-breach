# NEON BREACH — Netlify production config
# Deploy: connect this repo in Netlify (or `npx netlify deploy --prod`)

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"
  # Keep Blobs as a runtime package so Netlify can inject site credentials.
  external_node_modules = ["@netlify/blobs"]

# Party leaderboard (shared world board for family & friends)
[[redirects]]
  from = "/api/leaderboard"
  to = "/.netlify/functions/leaderboard"
  status = 200
  force = true

# Campaign cloud is optional — client falls back to localStorage
[[redirects]]
  from = "/api/campaigns"
  to = "/.netlify/functions/campaigns"
  status = 200
  force = true

# Health check
[[redirects]]
  from = "/health"
  to = "/.netlify/functions/health"
  status = 200
  force = true

# Anonymous aggregate telemetry
[[redirects]]
  from = "/api/telemetry"
  to = "/.netlify/functions/telemetry"
  status = 200
  force = true

# SPA-style: unknown paths serve the game shell
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/game.js"
  [headers.values]
    Cache-Control = "public, max-age=300"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/vendor/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
